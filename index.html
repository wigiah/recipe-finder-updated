<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wigiah's Recipe Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Find Me a Meal</h1>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search by ingredient (e.g., chicken)...">
                <button id="search-btn">Search</button>
            </div>  
            <button id="random-btn">Surprise Me! 🎲</button>
        </div>

        <div class="suggestions" id="suggestions">
            <span>Trending:</span>
            <button class="chip">Chicken</button>
            <button class="chip">Pasta</button>
            <button class="chip">Vegan</button>
            <button class="chip">Dessert</button>
            <button class="chip">Seafood</button>
            <button class="chip">Breakfast</button>
        </div>

        <p id="recipe-count"></p>
        <div id="meal-results" class="meal-grid"></div>
        <button id="load-more-btn" style="display: none;">Load More</button>
    </div>

    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
