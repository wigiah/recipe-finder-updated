<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Find Your Next Meal</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search by ingredient (e.g., chicken)...">
            <button id="search-btn">Search</button>
            <button id="random-btn" style="background: #4ecdc4;">Surprise Me! 🎲</button>
        </div>
        <div id="meal-results" class="meal-grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
